<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<title>New Password</title>

<style>

body{
    background:#f1f5f9;
    font-family:Arial;
}

.box{
    width:400px;
    margin:80px auto;
    background:white;
    padding:30px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}

h2{
    text-align:center;
    margin-bottom:20px;
}

button{
    width:100%;
}

</style>

</head>

<body>

<div class="box">

<h2>Create New Password</h2>

<form method="POST">

<input type="password"
name="password"
placeholder="New Password"
class="form-control mb-3"
required>

<button type="submit"
class="btn btn-danger">

Update Password

</button>

</form>

</div>

</body>
</html>
