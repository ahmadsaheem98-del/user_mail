<!DOCTYPE html>
<html lang="en">

<head>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Create User Account</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#111827,#1e293b,#334155);
}

.register-box{
    width:420px;
    background:white;
    padding:40px;
    border-radius:15px;
    box-shadow:0 0 30px rgba(0,0,0,0.3);
}

h2{
    text-align:center;
    margin-bottom:25px;
    color:#111827;
}

.input-group{
    margin-bottom:20px;
}

label{
    display:block;
    margin-bottom:8px;
    font-weight:bold;
    color:#374151;
}

input{
    width:100%;
    padding:12px;
    border:1px solid #cbd5e1;
    border-radius:8px;
    outline:none;
    font-size:15px;
}

input:focus{
    border-color:#2563eb;
    box-shadow:0 0 5px rgba(37,99,235,0.4);
}

button{
    width:100%;
    padding:13px;
    border:none;
    background:#16a34a;
    color:white;
    font-size:16px;
    border-radius:8px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#15803d;
}

.bottom{
    text-align:center;
    margin-top:18px;
}

.bottom a{
    text-decoration:none;
    color:#2563eb;
    font-weight:bold;
}

.info-box{
    margin-top:25px;
    padding:12px;
    background:#f1f5f9;
    border-radius:8px;
    font-size:14px;
    text-align:center;
}

</style>

</head>

<body>

<div class="register-box">

    <h2>Create User Account</h2>

    <form method="POST">

        <div class="input-group">

            <label>Username</label>

            <input type="text"
                   name="username"
                   required>

        </div>

        <div class="input-group">

            <label> Email ID</label>

            <input type="email"
                   name="email"
                   required>

        </div>

        <div class="input-group">

            <label>Password</label>

            <input type="password"
                   name="password"
                   required>

        </div>

        <button type="submit">

            Register User

        </button>

    </form>

    <div class="bottom">

        Already have account?

        <a href="/">
            Login
        </a>

    </div>

    <div class="info-box">

        Register using your real email ID.

    </div>

</div>

</body>
</html>
