<!DOCTYPE html>
<html>
<head>
    <title>Forgot Password</title>
    <style>
        body {
            font-family: Arial;
            background: #f1f5f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .box {
            background: white;
            padding: 25px;
            border-radius: 10px;
            width: 350px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        input {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #1e40af;
        }

        h2 {
            text-align: center;
        }

        .msg {
            color: red;
            text-align: center;
        }
    </style>
</head>

<body>

<div class="box">

    <h2>Forgot Password</h2>

    <!-- Flask flash message -->
    {% with messages = get_flashed_messages() %}
      {% if messages %}
        <p class="msg">{{ messages[0] }}</p>
      {% endif %}
    {% endwith %}

    <form method="POST">

        <input type="email"
               name="email"
               placeholder="Enter your registered email"
               required>

        <button type="submit">Send OTP</button>

    </form>

</div>

</body>
</html>
