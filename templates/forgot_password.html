<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Forgot Password</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    background: linear-gradient(135deg, #667eea, #764ba2);
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: Arial;
}

.card-box {
    width: 400px;
    background: white;
    padding: 30px;
    border-radius: 15px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
}

h2 {
    text-align: center;
    margin-bottom: 20px;
    font-weight: bold;
}

.btn-custom {
    width: 100%;
    background: #667eea;
    color: white;
    font-weight: bold;
}

.btn-custom:hover {
    background: #5a67d8;
}
</style>

</head>

<body>

<div class="card-box">

    <h2>Forgot Password</h2>
    <p class="text-muted text-center">Enter your phone number to receive OTP</p>

    <form method="POST">

        <div class="mb-3">
            <input type="text"
                   name="phone"
                   class="form-control"
                   placeholder="+91XXXXXXXXXX"
                   required>
        </div>

        <button type="submit" class="btn btn-custom">
            Send OTP
        </button>

    </form>

</div>

</body>
</html>
