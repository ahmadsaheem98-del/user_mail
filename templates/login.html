<!DOCTYPE html>
<html lang="en">

<head>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Secure Login</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#0f172a,#1e293b,#334155);
}

.login-box{
    width:420px;
    background:white;
    padding:40px;
    border-radius:15px;
    box-shadow:0 0 30px rgba(0,0,0,0.3);
}

.logo{
    text-align:center;
    margin-bottom:20px;
}

.logo img{
    width:120px;
}

h2{
    text-align:center;
    margin-bottom:25px;
    color:#111827;
}

.input-group{
    margin-bottom:20px;
}

label{
    display:block;
    margin-bottom:8px;
    font-weight:bold;
    color:#374151;
}

input{
    width:100%;
    padding:12px;
    border:1px solid #cbd5e1;
    border-radius:8px;
    outline:none;
    font-size:15px;
}

input:focus{
    border-color:#2563eb;
    box-shadow:0 0 5px rgba(37,99,235,0.4);
}

button{
    width:100%;
    padding:13px;
    border:none;
    background:#2563eb;
    color:white;
    font-size:16px;
    border-radius:8px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#1d4ed8;
}

.bottom{
    text-align:center;
    margin-top:18px;
}

.bottom a{
    text-decoration:none;
    color:#2563eb;
    font-weight:bold;
}

.admin-box{
    margin-top:25px;
    padding:12px;
    background:#f1f5f9;
    border-radius:8px;
    font-size:14px;
}

</style>

</head>

<body>

<div class="login-box">

    <div class="logo">
        <img src="{{ url_for('static', filename='download.png') }}">
    </div>

    <h2>MAIL ID CREATION REQUISITION FORM</h2>

    <form method="POST">

        <div class="input-group">

            <label>Username</label>

            <input type="text" name="username" required>

        </div>

        <div class="input-group">

            <label>Password</label>

            <input type="password" name="password" required>

        </div>

        <button type="submit">
            Secure Login
        </button>
<br><br>

<a href="/forgot_password" class="btn btn-warning w-100">
    Forgot Password / OTP
</a>

    </form>

    <div class="bottom">

        New User?

        <a href="/register">
            Create Account
        </a>

    </div>

    

</div>

</body>
</html>
